    const c = cores[cat]||{bg:'#E8E0D0',txt:'#6B7B6C'};
    return { fontSize:10, fontWeight:600, padding:'2px 8px', borderRadius:20, background:c.bg, color:c.txt, whiteSpace:'nowrap' };
  },
  statusBadge: (qtd, min, id) => {
    if (min===0) return { background:'#F5F0E8', color:'#6B7B6C', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
    const estrito = IDS_ALERTA_ESTRITO.includes(id);
    if (estrito && qtd >= min) return { background:'#E8F4E8', color:'#27AE60', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
    const pct = qtd/min;
    if (qtd<=0) return { background:'#FDEDEC', color:'#C0392B', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
    if (pct<=0.5) return { background:'#FFF3E0', color:'#E67E22', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
    if (pct<=1) return { background:'#FFFDE0', color:'#B7950B', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
    return { background:'#E8F4E8', color:'#27AE60', padding:'2px 10px', borderRadius:20, fontSize:10, fontWeight:700 };
  },
  statusTxt: (qtd, min, id) => {
    if (min===0) return 'SEM MÍN';
    const estrito = IDS_ALERTA_ESTRITO.includes(id);
    if (estrito && qtd >= min) return 'OK';
    const pct = qtd/min;
    if (qtd<=0) return 'ZERADO';
    if (pct<=0.5) return '⚠ CRÍTICO';
    if (pct<=1) return 'REPOR';
    return 'OK';
  },
  fmtR: (v) => 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}),
};

// Itens com alerta estrito: só avisa quando ficar ABAIXO do mínimo (não quando igual)
const IDS_ALERTA_ESTRITO = [109, 111]; // Pá com Cabo, Pá Vanga de Bico com cabo

function estaEmAlerta(item) {
  if (!item.minimo || item.minimo <= 0) return false;
  if (IDS_ALERTA_ESTRITO.includes(item.id)) {
    return item.qtd < item.minimo;
  }
  return item.qtd <= item.minimo;
}

  useEffect(() => {
    // Itens — se a coleção estiver vazia, popular com ESTOQUE_INICIAL
    const unsubItens = db.collection('estoque_itens').onSnapshot(snap => {
      if (snap.empty) {
        // Primeira vez: popular o Firebase com os itens iniciais
        const batch = db.batch();
        ESTOQUE_INICIAL.forEach(item => {
          batch.set(db.collection('estoque_itens').doc(String(item.id)), item);
        });
        batch.commit()
          .then(() => console.log('Estoque inicial populado'))
          .catch(e => { console.error('Erro ao popular:', e); alert('Erro ao popular estoque: ' + e.message); });
        // Mostrar os itens iniciais na tela imediatamente (otimista)
        const arr = [...ESTOQUE_INICIAL];
        arr.sort((a,b) => a.nome.localeCompare(b.nome));
        setItens(arr);
      } else {
        const arr = snap.docs.map(d => d.data());
        arr.sort((a,b) => a.nome.localeCompare(b.nome));
        setItens(arr);
      }
      setCarregando(false);
    }, err => {
      console.error('Erro Firestore:', err);
      alert('Erro ao conectar no banco: ' + err.message + '\n\nVerifique as regras do Firestore.');
      setCarregando(false);
    });

    const unsubMovs = db.collection('estoque_movimentos').onSnapshot(snap => {
      const arr = snap.docs.map(d => d.data());
      arr.sort((a,b) => b.id - a.id);
      setMovimentos(arr);
    });

    const unsubReqs = db.collection('estoque_requisicoes').onSnapshot(snap => {
      const arr = snap.docs.map(d => d.data());
      arr.sort((a,b) => b.id - a.id);
      setRequisicoes(arr);
    });

    return () => { unsubItens(); unsubMovs(); unsubReqs(); };
  }, []);

  // ===== FIREBASE: funções de salvar =====
  function fbSalvarItem(item) {
    db.collection('estoque_itens').doc(String(item.id)).set(item).catch(e=>console.warn(e));
  }
  function fbSalvarMovimento(mov) {
    db.collection('estoque_movimentos').doc(String(mov.id)).set(mov).catch(e=>console.warn(e));
  }
  function fbSalvarRequisicao(req) {
    db.collection('estoque_requisicoes').doc(String(req.id)).set(req).catch(e=>console.warn(e));
  }
  const [novaReq, setNovaReq] = useState({solicitante:'',descricao:'',link:'',urgencia:'normal'});
  const [reqItens, setReqItens] = useState([]); // lista de itens da requisição atual
  const [itemTemp, setItemTemp] = useState({nome:'',qtd:1});
  const [aba, setAba] = useState('dashboard');
  const [catFiltro, setCatFiltro] = useState('todas');
  const [alertaCat, setAlertaCat] = useState('todas');
  const [busca, setBusca] = useState('');
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [novoItem, setNovoItem] = useState({nome:'',categoria:'insumos',unidade:'UN',qtd:0,minimo:0,preco:0});
  const [toast, setToast] = useState('');

  function adicionarItemReq() {
    if (!itemTemp.nome.trim()) return alert('Informe o item.');
    const qtd = Number(itemTemp.qtd) || 1;
    setReqItens([...reqItens, { nome: itemTemp.nome.trim(), qtd }]);
    setItemTemp({nome:'',qtd:1});
  }

  function removerItemReq(idx) {
    setReqItens(reqItens.filter((_, i) => i !== idx));
  }

  function enviarRequisicao() {
    if (!novaReq.solicitante.trim()) return alert('Informe seu nome.');
    if (reqItens.length === 0) return alert('Adicione pelo menos um item à requisição.');
    const req = {
      id: Date.now(),
      solicitante: novaReq.solicitante.trim(),
      itens: reqItens,
      descricao: novaReq.descricao.trim(),
      link: novaReq.link.trim(),
      urgencia: novaReq.urgencia,
      data: new Date().toLocaleDateString('pt-BR'),
      hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      status: 'pendente'
    };
    fbSalvarRequisicao(req);

    // Disparar e-mail de nova requisição
    const listaTexto = reqItens.map(it => `  • ${it.nome} — ${it.qtd}x`).join('\n');
    const urgTag = req.urgencia === 'urgente' ? ' 🔥 URGENTE' : '';
    const corpoReq =
      `Solicitante: ${req.solicitante}\n` +
      `Urgência: ${req.urgencia === 'urgente' ? '🔥 URGENTE' : 'Normal'}\n` +
      `Data: ${req.data} ${req.hora}\n\n` +
      `ITENS:\n${listaTexto}\n\n` +
      `Observação: ${req.descricao || '(nenhuma)'}\n` +
      `Link: ${req.link || '(nenhum)'}`;
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_GENERICO, {
      assunto: `📋 Nova Requisição — ${req.solicitante}${urgTag}`,
      titulo: 'Nova requisição de compra recebida!',
      corpo: corpoReq
    }).catch(e => console.warn('EmailJS req:', e));

    setNovaReq({solicitante:'',descricao:'',link:'',urgencia:'normal'});
    setReqItens([]);
    setItemTemp({nome:'',qtd:1});
    showToast('Requisição enviada ✓');
  }

  function atualizarStatusReq(id, status) {
    const req = requisicoes.find(r=>r.id===id);
    if (req) fbSalvarRequisicao({...req, status});
    showToast(status==='aprovada'?'Requisição aprovada ✓':'Requisição recusada');
  }

  const reqPendentes = requisicoes.filter(r=>r.status==='pendente');

  function showToast(msg) {
    setToast(msg);
    setTimeout(()=>setToast(''), 2500);
  }

  const itensFiltrados = useMemo(()=>itens.filter(i=>
    (catFiltro==='todas'||i.categoria===catFiltro) &&
    i.nome.toLowerCase().includes(busca.toLowerCase())
  ),[itens,catFiltro,busca]);

  const alertas = useMemo(()=>itens.filter(i=>estaEmAlerta(i)),[itens]);
  const alertasFilt = useMemo(()=>alertas.filter(i=>alertaCat==='todas'||i.categoria===alertaCat),[alertas,alertaCat]);
  const totalValor = itens.reduce((s,i)=>s+i.qtd*i.preco,0);

  function registrarMovimento() {
    const {tipo,qtd,responsavel,obs} = form;
    const q = Number(qtd);
    if (!tipo||!q||!responsavel) return alert('Preencha todos os campos obrigatórios.');
    if (tipo==='saida'&&q>modal.item.qtd) return alert('Quantidade insuficiente em estoque.');
    const novaQtd = tipo==='entrada' ? modal.item.qtd+q : modal.item.qtd-q;
    const itemAtualizado = {...modal.item, qtd:novaQtd};
    const novoMov = { id:Date.now(), itemId:modal.item.id, tipo, qtd:q, responsavel, obs:obs||'', data:new Date().toLocaleDateString('pt-BR') };
    fbSalvarItem(itemAtualizado);
    fbSalvarMovimento(novoMov);

    // Disparar alerta por e-mail se a saída cruzou o mínimo
    if (tipo==='saida' && modal.item.minimo>0) {
      const estavaOk = modal.item.qtd > modal.item.minimo;
      const ficouBaixo = novaQtd <= modal.item.minimo;
      if (estavaOk && ficouBaixo) {
        enviarAlertaEmail(itemAtualizado);
      }
    }

    setModal(null);
    setForm({});
    showToast(tipo==='entrada'?'Entrada registrada ✓':'Saída registrada ✓');
  }

  function enviarListaReposicao() {
    if (alertas.length === 0) { showToast('Nenhum item para repor'); return; }
    const cats = { insumos:'INSUMOS', ferramentas:'FERRAMENTAS', epis:'EPIs', consumo:'USO & CONSUMO' };
    let texto = '';
    Object.keys(cats).forEach(catKey => {
      const itensCat = alertas.filter(i => i.categoria === catKey);
      if (itensCat.length === 0) return;
      texto += `\n${cats[catKey]}\n`;
      itensCat.forEach(i => {
        const status = i.qtd <= 0 ? 'ZERADO' : 'CRÍTICO';
        texto += `  • ${i.nome} — atual: ${i.qtd} ${i.unidade} / mín: ${i.minimo} [${status}]\n`;
      });
    });
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_GENERICO, {
      assunto: `📋 Lista de Reposição — INDOOR (${alertas.length} itens)`,
      titulo: 'Itens que precisam de reposição:',
      corpo: texto + `\nTotal: ${alertas.length} itens`
    }).then(() => {
      showToast('Lista enviada por e-mail ✓');
    }).catch(e => {
      console.warn('EmailJS lista:', e);
      showToast('Erro ao enviar — verifique o template');
    });
  }

  function aplicarAjustesMinimo() {
    const idsZerar = [4, 21, 22, 102, 63, 59, 139, 168, 172, 150];
    let count = 0;
    itens.forEach(item => {
      if (idsZerar.includes(item.id) && item.minimo !== 0) {
        fbSalvarItem({ ...item, minimo: 0 });
        count++;
      }
    });
    showToast(`${count} itens ajustados ✓`);
  }

  function adicionarItem() {
    if (!novoItem.nome.trim()) return alert('Informe o nome do item.');
    const novo = {...novoItem, id:Date.now(), qtd:Number(novoItem.qtd), minimo:Number(novoItem.minimo), preco:Number(novoItem.preco)};
    fbSalvarItem(novo);
    setModal(null);
    setNovoItem({nome:'',categoria:'insumos',unidade:'UN',qtd:0,minimo:0,preco:0});
    showToast('Item adicionado ✓');
  }

  // ===== RENDER =====
  if (carregando) {
    return (
      <div style={{minHeight:'100vh',background:'#F5F0E8',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontSize:40,marginBottom:12}}>🌿</div>
        <div style={{fontFamily:'DM Sans,sans-serif',fontSize:15,color:'#6B7B6C'}}>Carregando estoque...</div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh',background:'#F5F0E8',paddingBottom:80}}>

      {/* HEADER */}
      <div style={S.hdr}>
        <div style={S.hdrTop}>
          <span style={S.logo}>INDOOR</span>
          <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'#7A9E76'}}>
            {new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})}
          </span>
        </div>
        <div style={S.hdrSub}>Controle de Estoque</div>
        <div style={S.nav}>
          {['dashboard','estoque','alertas','movimentos','requisicao'].map(a=>(
            <button key={a} style={S.nb(aba===a)} onClick={()=>setAba(a)}>
              {a==='dashboard'?'Dashboard':a==='estoque'?'Estoque':a==='alertas'?`Alertas${alertas.length>0?` (${alertas.length})`:''}`:a==='movimentos'?'Histórico':'Requisições'}
            </button>
          ))}
        </div>
      </div>

      <div style={S.body}>

        {/* DASHBOARD */}
        {aba==='dashboard' && (
          <>
            {/* Resumo valor */}
            <div style={{background:'#2C3E2D',borderRadius:14,padding:16,marginBottom:20,color:'#FDFCF9'}}>
              <div style={{fontSize:11,color:'#7A9E76',letterSpacing:1,marginBottom:4}}>VALOR TOTAL EM ESTOQUE</div>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:28,fontWeight:500}}>{S.fmtR(totalValor)}</div>
              <div style={{fontSize:12,color:'#7A9E76',marginTop:4}}>{itens.length} itens cadastrados</div>
            </div>

            {/* Cards por categoria */}
            <span style={S.stit}>Por categoria</span>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
              {Object.entries(CATEGORIAS).map(([key,cat])=>{
                const itCat = itens.filter(i=>i.categoria===key);
                const alts = alertas.filter(i=>i.categoria===key);
                const handleClick = () => {
                  if (key==='insumos') { setAba('estoque'); setCatFiltro('insumos'); }
                  else if (alts.length>0) { setAba('alertas'); setAlertaCat(key); }
                  else { setAba('estoque'); setCatFiltro(key); }
                };
                return (
                  <div key={key} style={{...S.card(), borderLeft:`3px solid`, borderLeftColor:cat.cor, cursor:'pointer'}}
                    onClick={handleClick}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <span style={{fontSize:20}}>{cat.emoji}</span>
                      <span style={S.badge(key)}>{cat.label}</span>
                    </div>
                    <div style={{fontFamily:'DM Mono,monospace',fontSize:24,fontWeight:500,color:'#2C3E2D'}}>{itCat.length}</div>
                    <div style={{fontSize:11,color:'#6B7B6C',marginTop:2}}>
                      {alts.length>0
                        ? <span style={{color:'#E67E22'}}>⚠ {alts.length} para repor</span>
                        : <span style={{color:'#27AE60'}}>tudo OK</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Requisições pendentes */}
            {reqPendentes.length>0 && (
              <>
                <span style={S.stit}>Requisições pendentes</span>
                {reqPendentes.slice(0,3).map(r=>(
                  <div key={r.id} style={{...S.card(`1px solid ${r.urgencia==='urgente'?'#E67E22':'#E8E0D0'}`),borderLeft:`3px solid ${r.urgencia==='urgente'?'#E67E22':'#4A6741'}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div style={{flex:1,marginRight:8}}>
                        <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D'}}>{(r.itens && r.itens.length) ? `${r.itens.length} ${r.itens.length>1?'itens':'item'}` : r.nome}</div>
                        <div style={{fontSize:11,color:'#6B7B6C',marginTop:2}}>{r.data} {r.hora}{r.solicitante?` · 👤 ${r.solicitante}`:""}</div>
                      </div>
                      {r.urgencia==='urgente' && <span style={{background:'#FFF3E0',color:'#E67E22',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,whiteSpace:'nowrap'}}>🔥 URGENTE</span>}
                    </div>
                    {r.itens && r.itens.length > 0 && (
                      <div style={{marginBottom:10}}>
                        {r.itens.map((it,idx)=>(
                          <div key={idx} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0',borderBottom:'1px solid #F5F0E8'}}>
                            <span style={{color:'#1E2B1F'}}>{it.nome}</span>
                            <span style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'#2C3E2D'}}>{it.qtd}x</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {r.descricao && <div style={{fontSize:13,color:'#6B7B6C',marginBottom:10}}>{r.descricao}</div>}
                    {r.link && <a href={r.link} target="_blank" rel="noreferrer" style={{fontSize:12,color:'#4A6741',display:'block',marginBottom:10,wordBreak:'break-all'}}>🔗 Ver produto</a>}
                    <div style={{display:'flex',gap:8}}>
                      <button style={{...S.btnEntrada,flex:1}} onClick={()=>atualizarStatusReq(r.id,'aprovada')}>✓ Aprovar</button>
                      <button style={{...S.btnSaida,flex:1}} onClick={()=>atualizarStatusReq(r.id,'recusada')}>✗ Recusar</button>
                    </div>
                  </div>
                ))}
                {reqPendentes.length>3 && <div style={{textAlign:'center',fontSize:12,color:'#6B7B6C',marginTop:4,cursor:'pointer'}} onClick={()=>setAba('requisicao')}>Ver todas as {reqPendentes.length} requisições →</div>}
              </>
            )}
            {alertas.length>0 && (
              <>
                <span style={S.stit}>Itens para repor</span>
                {alertas.slice(0,5).map(item=>(
                  <div key={item.id} style={{...S.card('1px solid #F5C6A0'),display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D'}}>{item.nome}</div>
                      <div style={{fontSize:11,color:'#6B7B6C',marginTop:2}}>
                        <span style={S.badge(item.categoria)}>{CATEGORIAS[item.categoria]?.emoji} {CATEGORIAS[item.categoria]?.label}</span>
                        <span style={{marginLeft:8}}>Atual: <strong style={{color:item.qtd<=0?'#C0392B':'#E67E22'}}>{item.qtd} {item.unidade}</strong> · Mín: {item.minimo}</span>
                      </div>
                    </div>
                    <button style={S.btnEntrada} onClick={()=>{setModal({tipo:'movimento',item});setForm({tipo:'entrada'});setAba('estoque');}}>↑ Entrada</button>
                  </div>
                ))}
                {alertas.length>5 && <div style={{textAlign:'center',fontSize:12,color:'#6B7B6C',marginTop:4,cursor:'pointer'}} onClick={()=>setAba('alertas')}>Ver todos os {alertas.length} alertas →</div>}
              </>
            )}
          </>
        )}

        {/* ESTOQUE */}
        {aba==='estoque' && (
          <>
            <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
              <input placeholder="🔍 Buscar item..." style={{...S.inp,flex:1,minWidth:140}} value={busca} onChange={e=>setBusca(e.target.value)} />
              <select style={{...S.sel,width:'auto'}} value={catFiltro} onChange={e=>setCatFiltro(e.target.value)}>
                <option value="todas">Todas</option>
                {Object.entries(CATEGORIAS).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
              </select>
            </div>
            <button style={{...S.btnPrim,marginBottom:16}} onClick={()=>setModal({tipo:'addItem'})}>+ Novo item</button>
            <div style={{fontSize:11,color:'#6B7B6C',marginBottom:8}}>{itensFiltrados.length} itens</div>
            {itensFiltrados.map(item=>(
              <div key={item.id} style={S.card()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{flex:1,marginRight:8}}>
                    <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D',lineHeight:1.3}}>{item.nome}</div>
                    <div style={{marginTop:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span style={S.badge(item.categoria)}>{CATEGORIAS[item.categoria]?.emoji} {CATEGORIAS[item.categoria]?.label}</span>
                      <span style={{...S.statusBadge(item.qtd,item.minimo,item.id)}}>{S.statusTxt(item.qtd,item.minimo,item.id)}</span>
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontFamily:'DM Mono,monospace',fontSize:20,fontWeight:500,color:estaEmAlerta(item)?'#C0392B':'#2C3E2D'}}>{item.qtd}</div>
                    <div style={{fontSize:11,color:'#6B7B6C'}}>{item.unidade}</div>
                  </div>
                </div>
                {item.minimo>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#6B7B6C',marginBottom:3}}>
                      <span>Estoque</span><span>Mín: {item.minimo} {item.unidade}</span>
                    </div>
                    <div style={{height:5,background:'#E8E0D0',borderRadius:4,overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:4,background:item.qtd<=0?'#C0392B':item.qtd/item.minimo<=0.5?'#E67E22':'#4A6741',width:`${Math.min(Math.max(item.qtd/item.minimo*100,0),100)}%`,transition:'width .4s'}} />
                    </div>
                  </div>
                )}
                <div style={{display:'flex',gap:8}}>
                  <button style={{...S.btnEntrada,flex:1}} onClick={()=>{setModal({tipo:'movimento',item});setForm({tipo:'entrada'});}}>↑ Entrada</button>
                  <button style={{...S.btnSaida,flex:1}} onClick={()=>{setModal({tipo:'movimento',item});setForm({tipo:'saida'});}}>↓ Saída</button>
                </div>
              </div>
            ))}
          </>
        )}

        {/* ALERTAS */}
        {aba==='alertas' && (
          alertas.length===0
            ? <div style={{textAlign:'center',padding:60,color:'#27AE60'}}>
                <div style={{fontSize:44}}>✅</div>
                <div style={{fontSize:18,fontWeight:600,marginTop:10,color:'#2C3E2D'}}>Tudo em dia!</div>
                <div style={{color:'#6B7B6C',marginTop:6,fontSize:13}}>Nenhum item abaixo do mínimo.</div>
              </div>
            : <>
                <button style={{...S.btnPrim,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}} onClick={enviarListaReposicao}>
                  📧 Enviar lista de reposição por e-mail
                </button>
                <button style={{...S.btnSec(),width:'100%',marginBottom:16,padding:'10px',fontSize:11,color:'#A67C52'}} onClick={aplicarAjustesMinimo}>
                  🔧 Aplicar ajuste de mínimos (clicar 1x)
                </button>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
                  <button style={S.btnSec(alertaCat==='todas'?'#2C3E2D':undefined)} onClick={()=>setAlertaCat('todas')}
                    {...(alertaCat==='todas'?{style:{...S.btnSec(),...{background:'#2C3E2D',color:'#FDFCF9',border:'none'}}}:{})}>
                    Todas ({alertas.length})
                  </button>
                  {Object.entries(CATEGORIAS).map(([key,cat])=>{
                    const qtd = alertas.filter(i=>i.categoria===key).length;
                    if (qtd===0) return null;
                    return <button key={key} style={alertaCat===key?{...S.btnSec(),...{background:'#2C3E2D',color:'#FDFCF9',border:'none'}}:S.btnSec()} onClick={()=>setAlertaCat(key)}>
                      {cat.emoji} {cat.label} ({qtd})
                    </button>;
                  })}
                </div>
                {alertasFilt.map(item=>(
                  <div key={item.id} style={{...S.card('1px solid #F5C6A0')}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D'}}>{item.nome}</div>
                        <div style={{marginTop:4,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                          <span style={S.badge(item.categoria)}>{CATEGORIAS[item.categoria]?.emoji} {CATEGORIAS[item.categoria]?.label}</span>
                          <span style={{fontSize:11,color:'#6B7B6C'}}>Atual: <strong style={{color:item.qtd<=0?'#C0392B':'#E67E22'}}>{item.qtd} {item.unidade}</strong> · Mín: {item.minimo}</span>
                        </div>
                      </div>
                      <span style={S.statusBadge(item.qtd,item.minimo,item.id)}>{S.statusTxt(item.qtd,item.minimo,item.id)}</span>
                    </div>
                    <div style={{height:5,background:'#E8E0D0',borderRadius:4,overflow:'hidden',marginBottom:10}}>
                      <div style={{height:'100%',borderRadius:4,background:item.qtd<=0?'#C0392B':'#E67E22',width:`${Math.min(Math.max(item.qtd/item.minimo*100,0),100)}%`}} />
                    </div>
                    <button style={{...S.btnEntrada,width:'100%'}} onClick={()=>{setModal({tipo:'movimento',item});setForm({tipo:'entrada'});setAba('estoque');}}>↑ Registrar entrada</button>
                  </div>
                ))}
              </>
        )}

        {/* HISTÓRICO */}
        {aba==='movimentos' && (
          movimentos.length===0
            ? <div style={{textAlign:'center',padding:60,color:'#6B7B6C'}}>
                <div style={{fontSize:40,marginBottom:10}}>📋</div>
                <div style={{fontSize:14}}>Nenhuma movimentação registrada ainda</div>
              </div>
            : movimentos.map(m=>{
                const item = itens.find(i=>i.id===m.itemId);
                return (
                  <div key={m.id} style={{...S.card(),borderLeft:`3px solid ${m.tipo==='entrada'?'#27AE60':'#C0392B'}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                      <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D',flex:1,marginRight:8}}>{item?.nome||'—'}</div>
                      <span style={{background:m.tipo==='entrada'?'#E8F4E8':'#FDEDEC',color:m.tipo==='entrada'?'#27AE60':'#C0392B',padding:'2px 10px',borderRadius:20,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                        {m.tipo==='entrada'?'↑ ENTRADA':'↓ SAÍDA'}
                      </span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:6}}>
                      <div style={{background:'#F5F0E8',borderRadius:8,padding:'8px 10px'}}>
                        <div style={{fontSize:10,color:'#6B7B6C'}}>Quantidade</div>
                        <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:500}}>{m.qtd} {item?.unidade}</div>
                      </div>
                      <div style={{background:'#F5F0E8',borderRadius:8,padding:'8px 10px'}}>
                        <div style={{fontSize:10,color:'#6B7B6C'}}>Data</div>
                        <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:500}}>{m.data}</div>
                      </div>
                    </div>
                    <div style={{fontSize:12,color:'#6B7B6C'}}>👤 {m.responsavel}{m.obs?` · ${m.obs}`:''}</div>
                  </div>
                );
              })
        )}
      </div>

        {/* REQUISIÇÃO */}
        {aba==='requisicao' && (
          <>
            {/* Formulário de nova requisição */}
            <div style={S.card()}>
              <div style={{fontSize:15,fontWeight:600,color:'#2C3E2D',marginBottom:16}}>📋 Nova requisição</div>
              <label style={S.label}>SEU NOME *</label>
              <input style={{...S.inp,marginBottom:16}} placeholder="Ex: João Silva" value={novaReq.solicitante} onChange={e=>setNovaReq(n=>({...n,solicitante:e.target.value}))} />

              <label style={S.label}>ITENS DA REQUISIÇÃO *</label>
              <div style={{background:'#F5F0E8',borderRadius:10,padding:12,marginBottom:12}}>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input list="lista-itens-estoque" style={{...S.inp,flex:1}} placeholder="Buscar ou digitar item" value={itemTemp.nome} onChange={e=>setItemTemp(t=>({...t,nome:e.target.value}))} />
                  <input type="number" min="1" style={{...S.inp,width:70,textAlign:'center'}} value={itemTemp.qtd} onChange={e=>setItemTemp(t=>({...t,qtd:e.target.value}))} />
                  <button style={{...S.btnPrim,width:'auto',padding:'12px 16px'}} onClick={adicionarItemReq}>+</button>
                </div>
                <datalist id="lista-itens-estoque">
                  {itens.map(i=><option key={i.id} value={i.nome} />)}
                </datalist>
                {reqItens.length === 0
                  ? <div style={{fontSize:12,color:'#6B7B6C',textAlign:'center',padding:'8px 0'}}>Nenhum item adicionado ainda</div>
                  : reqItens.map((it, idx)=>(
                    <div key={idx} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#FDFCF9',borderRadius:8,padding:'8px 12px',marginBottom:6}}>
                      <span style={{fontSize:13,flex:1}}>{it.nome}</span>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:600,color:'#2C3E2D',marginRight:10}}>{it.qtd}x</span>
                      <span onClick={()=>removerItemReq(idx)} style={{cursor:'pointer',color:'#C0392B',fontSize:16}}>✕</span>
                    </div>
                  ))
                }
              </div>

              <label style={S.label}>OBSERVAÇÃO (opcional)</label>
              <textarea style={{...S.inp,marginBottom:12,resize:'vertical',minHeight:60}} placeholder="Ex: Para a obra da Residência Silva, urgente para segunda" value={novaReq.descricao} onChange={e=>setNovaReq(n=>({...n,descricao:e.target.value}))} />
              <label style={S.label}>🔗 LINK DO PRODUTO (opcional)</label>
              <input style={{...S.inp,marginBottom:12}} placeholder="Cole um link de referência (Mercado Livre, Amazon, etc.)" value={novaReq.link} onChange={e=>setNovaReq(n=>({...n,link:e.target.value}))} />
              <label style={S.label}>URGÊNCIA</label>
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['normal','urgente'].map(u=>(
                  <button key={u} style={{flex:1,padding:12,background:novaReq.urgencia===u?(u==='urgente'?'#E67E22':'#2C3E2D'):'#F5F0E8',color:novaReq.urgencia===u?'#FDFCF9':'#1E2B1F',border:'none',borderRadius:10,fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:500,cursor:'pointer'}} onClick={()=>setNovaReq(n=>({...n,urgencia:u}))}>
                    {u==='normal'?'Normal':'🔥 Urgente'}
                  </button>
                ))}
              </div>
              <button style={S.btnPrim} onClick={enviarRequisicao}>Enviar requisição</button>
            </div>

            {/* Histórico de requisições */}
            {requisicoes.length>0 && (
              <>
                <span style={{...S.stit,marginTop:8}}>Histórico</span>
                {requisicoes.map(r=>(
                  <div key={r.id} style={{...S.card(),borderLeft:`3px solid ${r.status==='aprovada'?'#27AE60':r.status==='recusada'?'#C0392B':r.urgencia==='urgente'?'#E67E22':'#4A6741'}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div style={{flex:1,marginRight:8}}>
                        <div style={{fontSize:14,fontWeight:600,color:'#2C3E2D'}}>{(r.itens && r.itens.length) ? `${r.itens.length} ${r.itens.length>1?'itens':'item'}` : r.nome}</div>
                        <div style={{fontSize:11,color:'#6B7B6C',marginTop:2}}>{r.data} {r.hora}{r.solicitante?` · 👤 ${r.solicitante}`:""}</div>
                      </div>
                      <span style={{
                        fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap',
                        background:r.status==='aprovada'?'#E8F4E8':r.status==='recusada'?'#FDEDEC':r.urgencia==='urgente'?'#FFF3E0':'#F5F0E8',
                        color:r.status==='aprovada'?'#27AE60':r.status==='recusada'?'#C0392B':r.urgencia==='urgente'?'#E67E22':'#6B7B6C'
                      }}>
                        {r.status==='aprovada'?'✓ APROVADA':r.status==='recusada'?'✗ RECUSADA':r.urgencia==='urgente'?'🔥 URGENTE':'PENDENTE'}
                      </span>
                    </div>
                    {r.itens && r.itens.length > 0 && (
                      <div style={{marginBottom:8}}>
                        {r.itens.map((it,idx)=>(
                          <div key={idx} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #F5F0E8'}}>
                            <span style={{color:'#1E2B1F'}}>{it.nome}</span>
                            <span style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'#2C3E2D'}}>{it.qtd}x</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {r.descricao && <div style={{fontSize:13,color:'#6B7B6C',marginBottom:r.link?8:0}}>{r.descricao}</div>}
                    {r.link && <a href={r.link} target="_blank" rel="noreferrer" style={{fontSize:12,color:'#4A6741',display:'block',wordBreak:'break-all'}}>🔗 Ver produto</a>}
                    {r.status==='pendente' && (
                      <div style={{display:'flex',gap:8,marginTop:10}}>
                        <button style={{...S.btnEntrada,flex:1}} onClick={()=>atualizarStatusReq(r.id,'aprovada')}>✓ Aprovar</button>
                        <button style={{...S.btnSaida,flex:1}} onClick={()=>atualizarStatusReq(r.id,'recusada')}>✗ Recusar</button>
                      </div>
                    )}
                  </div>
                ))}
              </>
            )}
          </>
        )}

        {/* MODAL MOVIMENTO */}
      {modal?.tipo==='movimento' && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:600,color:'#2C3E2D',marginBottom:4}}>{modal.item.nome}</div>
            <div style={{marginBottom:18}}><span style={S.badge(modal.item.categoria)}>{CATEGORIAS[modal.item.categoria]?.emoji} {CATEGORIAS[modal.item.categoria]?.label}</span></div>
            <label style={S.label}>TIPO</label>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {['entrada','saida'].map(t=>(
                <button key={t} style={{flex:1,padding:12,background:form.tipo===t?(t==='entrada'?'#2C3E2D':'#C0392B'):'#F5F0E8',color:form.tipo===t?'#FDFCF9':'#1E2B1F',border:'none',borderRadius:10,fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:500,cursor:'pointer'}} onClick={()=>setForm(f=>({...f,tipo:t}))}>
                  {t==='entrada'?'↑ Entrada':'↓ Saída'}
                </button>
              ))}
            </div>
            <label style={S.label}>QUANTIDADE ({modal.item.unidade}) *</label>
            <input type="number" min="1" style={{...S.inp,marginBottom:12}} value={form.qtd||''} onChange={e=>setForm(f=>({...f,qtd:e.target.value}))} />
            <label style={S.label}>RESPONSÁVEL *</label>
            <input style={{...S.inp,marginBottom:12}} placeholder="Nome de quem retirou/adicionou" value={form.responsavel||''} onChange={e=>setForm(f=>({...f,responsavel:e.target.value}))} />
            <label style={S.label}>OBSERVAÇÃO</label>
            <input style={{...S.inp,marginBottom:20}} placeholder="Ex: Projeto Residencial Jardins" value={form.obs||''} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} />
            <div style={{display:'flex',gap:10}}>
              <button style={{...S.btnSec(),flex:1,padding:14}} onClick={()=>setModal(null)}>Cancelar</button>
              <button style={{...S.btnPrim,flex:2}} onClick={registrarMovimento}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL NOVO ITEM */}
      {modal?.tipo==='addItem' && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:600,color:'#2C3E2D',marginBottom:18}}>Novo item</div>
            <label style={S.label}>NOME *</label>
            <input style={{...S.inp,marginBottom:12}} value={novoItem.nome} onChange={e=>setNovoItem(n=>({...n,nome:e.target.value}))} />
            <label style={S.label}>CATEGORIA</label>
            <select style={{...S.sel,marginBottom:12}} value={novoItem.categoria} onChange={e=>setNovoItem(n=>({...n,categoria:e.target.value}))}>
              {Object.entries(CATEGORIAS).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
            </select>
            <label style={S.label}>UNIDADE</label>
            <select style={{...S.sel,marginBottom:12}} value={novoItem.unidade} onChange={e=>setNovoItem(n=>({...n,unidade:e.target.value}))}>
              {['UN','KG','L','M','M2','M3','SC','BAG','PC','par','cx','RL'].map(u=><option key={u} value={u}>{u}</option>)}
            </select>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
              <div><label style={S.label}>QTD INICIAL</label><input type="number" style={S.inp} value={novoItem.qtd} onChange={e=>setNovoItem(n=>({...n,qtd:e.target.value}))} /></div>
              <div><label style={S.label}>MÍNIMO</label><input type="number" style={S.inp} value={novoItem.minimo} onChange={e=>setNovoItem(n=>({...n,minimo:e.target.value}))} /></div>
              <div><label style={S.label}>PREÇO</label><input type="number" step="0.01" style={S.inp} value={novoItem.preco} onChange={e=>setNovoItem(n=>({...n,preco:e.target.value}))} /></div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button style={{...S.btnSec(),flex:1,padding:14}} onClick={()=>setModal(null)}>Cancelar</button>
              <button style={{...S.btnPrim,flex:2}} onClick={adicionarItem}>Adicionar</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:'#2C3E2D',color:'#FDFCF9',padding:'12px 20px',borderRadius:30,fontSize:13,fontWeight:500,zIndex:300,whiteSpace:'nowrap'}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<script>
  // Transformação manual do JSX forçando runtime clássico (React.createElement),
  // evitando que o Babel injete "import" automático (automatic JSX runtime),
  // que quebra fora de um <script type="module">.
  (function() {
    const codigoFonte = document.getElementById('estoque-app-source').textContent;
    const resultado = Babel.transform(codigoFonte, {
      presets: [
        ['react', { runtime: 'classic' }],
        'env'
      ]
    }).code;
    const novoScript = document.createElement('script');
    novoScript.textContent = resultado;
    document.body.appendChild(novoScript);
  })();
</script>
</body>
</html>

function StatusBadge({ qtd, minimo }) {
  if (minimo === 0) return React.createElement('span', {style:{background:"#1e2f22",color:"#5a7a62",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700}}, "SEM MÍNIMO");
  const pct = qtd / minimo;
  if (qtd <= 0) return React.createElement('span', {style:{background:"#3d0000",color:"#ff6b6b",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700}}, "SEM ESTOQUE");
  if (pct <= 0.5) return React.createElement('span', {style:{background:"#3d1a00",color:"#ffaa44",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700}}, "⚠ CRÍTICO");
  if (pct <= 1) return React.createElement('span', {style:{background:"#2d2a00",color:"#ffe566",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700}}, "REPOR");
  return React.createElement('span', {style:{background:"#0d2e1a",color:"#5dca8a",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:700}}, "OK");
}

async function enviarAlertaEmail(item, cfg) {
  try {
    const resp = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: cfg.serviceId,
        template_id: cfg.templateId,
        user_id: cfg.publicKey,
        template_params: {
          item_nome: item.nome,
          qtd_atual: item.qtd + " " + item.unidade,
          qtd_minimo: item.minimo + " " + item.unidade,
          categoria: CATEGORIAS[item.categoria]?.label || item.categoria,
        },
      }),
    });
    return resp.ok;
  } catch { return false; }
}

    (catFiltro === "todas" || i.categoria === catFiltro) &&
    i.nome.toLowerCase().includes(busca.toLowerCase())
  ), [itens, catFiltro, busca]);

  const alertas = useMemo(() => itens.filter(i => i.minimo > 0 && i.qtd <= i.minimo), [itens]);
  const alertasFiltrados = useMemo(() => alertas.filter(i => alertaCatFiltro === "todas" || i.categoria === alertaCatFiltro), [alertas, alertaCatFiltro]);

    const { tipo, qtd, responsavel, obs } = form;
    const q = Number(qtd);
    if (!tipo || !q || !responsavel) return alert("Preencha todos os campos obrigatórios.");
    if (tipo === "saida" && q > modal.item.qtd) return alert("Quantidade insuficiente em estoque.");
    const novaQtd = tipo === "entrada" ? modal.item.qtd + q : modal.item.qtd - q;
    const itemAtualizado = { ...modal.item, qtd: novaQtd };
    setItens(prev => prev.map(i => i.id === modal.item.id ? itemAtualizado : i));
    setMovimentos(prev => [{ id: Date.now(), itemId: modal.item.id, tipo, qtd: q, responsavel, data: new Date().toISOString().split("T")[0], obs: obs || "" }, ...prev]);
    if (tipo === "saida" && itemAtualizado.minimo > 0 && novaQtd <= itemAtualizado.minimo) {
      setEmailStatus("enviando");
      const ok = await enviarAlertaEmail(itemAtualizado, emailConfig);
      setEmailStatus(ok ? "enviado" : "erro");
      setTimeout(() => setEmailStatus(""), 4000);
    }
    setModal(null); setForm({});
  }

                {Object.entries(CATEGORIAS).map(([k,v]) => <option key={k} value={k}>{v.emoji} {v.label}</option>)}
              </select>
              <button style={s.btn()} onClick={()=>setModal({tipo:"addItem"})}>+ Novo Item</button>
            </div>
            <div style={{...s.card(),overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  {["Item","Categoria","Qtd Atual","Mínimo","Status","Ações"].map(h=><th key={h} style={s.th}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {itensFiltrados.map(item => (
                    <tr key={item.id}>
                      <td style={s.td}><strong>{item.nome}</strong></td>
                      <td style={s.td}><span style={s.badge(item.categoria)}>{CATEGORIAS[item.categoria]?.emoji} {CATEGORIAS[item.categoria]?.label}</span></td>
                      <td style={s.td}><strong style={{color:item.minimo>0&&item.qtd<=item.minimo?"#ffaa44":"#7ecf96"}}>{item.qtd}</strong> <span style={{color:"#5a7a62",fontSize:11}}>{item.unidade}</span></td>
                      <td style={s.td}><span style={{color:"#5a7a62"}}>{item.minimo>0?item.minimo+" "+item.unidade:"—"}</span></td>
                      <td style={s.td}><StatusBadge qtd={item.qtd} minimo={item.minimo} /></td>
                      <td style={s.td}>
                        <button style={{...s.btn("#1a4a2a"),marginRight:5,padding:"5px 10px"}} onClick={()=>{setModal({tipo:"movimento",item});setForm({tipo:"entrada"});}}>↑ Entrada</button>
                        <button style={{...s.btn("#3a2010"),padding:"5px 10px"}} onClick={()=>{setModal({tipo:"movimento",item});setForm({tipo:"saida"});}}>↓ Saída</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {!abaConfig && aba==="movimentos" && (
          <div style={{...s.card(),overflowX:"auto"}}>
            {movimentos.length===0
              ? <div style={{textAlign:"center",padding:48,color:"#5a7a62"}}>Nenhuma movimentação registrada ainda.</div>
              : <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["Data","Item","Tipo","Qtd","Responsável","Obs"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
                  <tbody>
                    {movimentos.map(m => {
                      const item = itens.find(i=>i.id===m.itemId);
                      return (
                        <tr key={m.id}>
                          <td style={s.td}>{m.data}</td>
                          <td style={s.td}>{item?.nome||"—"}</td>
                          <td style={s.td}><span style={{background:m.tipo==="entrada"?"#0d2e1a":"#2e0d0d",color:m.tipo==="entrada"?"#5dca8a":"#ff6b6b",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700}}>{m.tipo==="entrada"?"↑ ENTRADA":"↓ SAÍDA"}</span></td>
                          <td style={s.td}><strong>{m.qtd}</strong> {item?.unidade}</td>
                          <td style={s.td}>{m.responsavel}</td>
                          <td style={{...s.td,color:"#6b8f72"}}>{m.obs||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            }
          </div>
        )}

        {!abaConfig && aba==="alertas" && (
          alertas.length===0
            ? <div style={{textAlign:"center",padding:60,color:"#5dca8a"}}>
                <div style={{fontSize:44}}>✅</div>
                <div style={{fontSize:18,fontWeight:700,marginTop:10}}>Tudo em dia!</div>
                <div style={{color:"#6b8f72",marginTop:6,fontSize:13}}>Nenhum item com mínimo definido está abaixo do limite.</div>
              </div>
            : <div style={{display:"grid",gap:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:4}}>
                  <div style={{color:"#ffaa44",fontWeight:700,fontSize:14}}>
                    ⚠ {alertasFiltrados.length}{alertasFiltrados.length!==alertas.length?` de ${alertas.length}`:""} itens precisam de atenção
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button style={{...s.btn(alertaCatFiltro==="todas"?"#2a4a33":"#1e2f22"),padding:"5px 12px",fontSize:12}} onClick={()=>setAlertaCatFiltro("todas")}>Todas</button>
                    {Object.entries(CATEGORIAS).map(([key,cat]) => {
                      const qtd = alertas.filter(i=>i.categoria===key).length;
                      if (qtd===0) return null;
                      return <button key={key} style={{...s.btn(alertaCatFiltro===key?"#2a4a33":"#1e2f22"),padding:"5px 12px",fontSize:12,borderLeft:`3px solid ${cat.cor}`}} onClick={()=>setAlertaCatFiltro(key)}>
                        {cat.emoji} {cat.label} <span style={{background:"#c0392b",borderRadius:10,padding:"1px 5px",fontSize:10,marginLeft:4}}>{qtd}</span>
                      </button>;
                    })}
                  </div>
                </div>
                {alertasFiltrados.map(item => {
                  const pct = item.minimo>0?item.qtd/item.minimo:1;
                  const cor = item.qtd<=0?"#ff4444":pct<=0.5?"#ff8c00":"#ffe566";
                  return (
                    <div key={item.id} style={{...s.card(cor+"44"),display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",flexWrap:"wrap",gap:10}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{item.nome}</div>
                        <div style={{color:"#6b8f72",fontSize:12,marginTop:4}}>
                          <span style={s.badge(item.categoria)}>{CATEGORIAS[item.categoria]?.emoji} {CATEGORIAS[item.categoria]?.label}</span>
                          <span style={{marginLeft:10}}>Atual: <strong style={{color:cor}}>{item.qtd} {item.unidade}</strong> · Mín: {item.minimo} {item.unidade}</span>
                        </div>
                        <div style={{marginTop:8,background:"#1e2f22",borderRadius:20,height:5,width:160}}>
                          <div style={{background:cor,width:`${Math.min(Math.max(pct*100,0),100)}%`,height:"100%",borderRadius:20}} />
                        </div>
                      </div>
                      <button style={{...s.btn(),padding:"6px 12px",fontSize:12}} onClick={()=>{setModal({tipo:"movimento",item});setForm({tipo:"entrada"});setAba("estoque");}}>↑ Registrar entrada</button>
                    </div>
                  );
                })}
              </div>
        )}
      </div>

      {modal?.tipo==="movimento" && (
        <div style={s.overlay} onClick={()=>setModal(null)}>
          <div style={s.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:800,color:"#7ecf96",marginBottom:18}}>📦 {modal.item.nome}</div>
            <label style={s.label}>TIPO</label>
            <div style={{display:"flex",gap:8}}>
              {["entrada","saida"].map(t => (
                <button key={t} style={{...s.btn(form.tipo===t?(t==="entrada"?"#2a7a45":"#7a2a2a"):"#1e2f22"),flex:1}} onClick={()=>setForm(f=>({...f,tipo:t}))}>
                  {t==="entrada"?"↑ Entrada":"↓ Saída"}
                </button>
              ))}
            </div>
            <label style={s.label}>QUANTIDADE ({modal.item.unidade}) *</label>
            <input type="number" min="1" style={s.input} value={form.qtd||""} onChange={e=>setForm(f=>({...f,qtd:e.target.value}))} />
            <label style={s.label}>RESPONSÁVEL *</label>
            <input style={s.input} placeholder="Nome de quem retirou/adicionou" value={form.responsavel||""} onChange={e=>setForm(f=>({...f,responsavel:e.target.value}))} />
            <label style={s.label}>OBSERVAÇÃO</label>
            <input style={s.input} placeholder="Ex: Projeto Residencial Jardins" value={form.obs||""} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} />
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <button style={{...s.btn("#333"),flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button style={{...s.btn(),flex:2}} onClick={registrarMovimento}>Confirmar</button>
            </div>
            <div style={{marginTop:12,color:"#5a7a62",fontSize:11,textAlign:"center"}}>📧 Alerta automático disparado se cair abaixo do mínimo</div>
          </div>
        </div>
      )}

      {modal?.tipo==="addItem" && (
        <div style={s.overlay} onClick={()=>setModal(null)}>
          <div style={s.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:800,color:"#7ecf96",marginBottom:18}}>➕ Novo Item</div>
            <label style={s.label}>NOME *</label>
            <input style={s.input} value={novoItem.nome} onChange={e=>setNovoItem(n=>({...n,nome:e.target.value}))} />
            <label style={s.label}>CATEGORIA</label>
            <select style={{...s.select,width:"100%"}} value={novoItem.categoria} onChange={e=>setNovoItem(n=>({...n,categoria:e.target.value}))}>
              {Object.entries(CATEGORIAS).map(([k,v]) => <option key={k} value={k}>{v.emoji} {v.label}</option>)}
            </select>
            <label style={s.label}>UNIDADE</label>
            <select style={{...s.select,width:"100%"}} value={novoItem.unidade} onChange={e=>setNovoItem(n=>({...n,unidade:e.target.value}))}>
              {["UN","KG","L","M","M2","M3","SC","BAG","PC","par","cx","RL"].map(u=><option key={u} value={u}>{u}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div><label style={s.label}>QTD INICIAL</label><input type="number" style={s.input} value={novoItem.qtd} onChange={e=>setNovoItem(n=>({...n,qtd:e.target.value}))} /></div>
              <div><label style={s.label}>MÍNIMO</label><input type="number" style={s.input} value={novoItem.minimo} onChange={e=>setNovoItem(n=>({...n,minimo:e.target.value}))} /></div>
              <div><label style={s.label}>PREÇO UNIT.</label><input type="number" step="0.01" style={s.input} value={novoItem.preco} onChange={e=>setNovoItem(n=>({...n,preco:e.target.value}))} /></div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <button style={{...s.btn("#333"),flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button style={{...s.btn(),flex:2}} onClick={adicionarItem}>Adicionar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
